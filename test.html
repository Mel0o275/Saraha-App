<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OTP Verification</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f9; font-family:Arial, sans-serif;">

  <table align="center" width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
    <tr>
      <td align="center">
        
        <!-- Card Container -->
        <table width="500" cellpadding="0" cellspacing="0" 
               style="background:#ffffff; border-radius:12px; padding:40px; box-shadow:0 5px 20px rgba(0,0,0,0.05);">
          
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <h2 style="margin:0; color:#6C63FF;">YourApp</h2>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td align="center" style="padding-bottom:15px;">
              <h1 style="margin:0; font-size:22px; color:#333;">
                Verify Your Email
              </h1>
            </td>
          </tr>

          <!-- Message -->
          <tr>
            <td align="center" style="padding-bottom:25px;">
              <p style="margin:0; font-size:14px; color:#666; line-height:22px;">
                Use the following One-Time Password (OTP) to complete your verification process.
                This code will expire in 5 minutes.
              </p>
            </td>
          </tr>

          <!-- OTP Box -->
          <tr>
            <td align="center" style="padding-bottom:30px;">
              <div style="
                  font-size:28px;
                  letter-spacing:6px;
                  font-weight:bold;
                  color:#6C63FF;
                  background:#f4f6ff;
                  padding:15px 30px;
                  border-radius:8px;
                  display:inline-block;">
                <!-- {{OTP_CODE}} -->
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center">
              <p style="font-size:12px; color:#999; margin:0;">
                If you didn’t request this code, you can safely ignore this email.
              </p>
            </td>
          </tr>

        </table>

        <!-- Bottom spacing -->
        <p style="font-size:12px; color:#aaa; margin-top:20px;">
          © 2026 YourApp. All rights reserved.
        </p>

      </td>
    </tr>
  </table>

</body>
</html>
